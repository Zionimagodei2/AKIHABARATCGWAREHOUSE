services:
  - type: web
    name: akihabara-tcg-warehouse
    runtime: static
    plan: free
    region: oregon
    buildCommand: bun install && bun run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
